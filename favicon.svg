<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#7C333B"/>
      <stop offset="1" stop-color="#4A1A20"/>
    </linearGradient>
  </defs>
  <rect width="100" height="100" rx="22" fill="url(#bg)"/>

  <g transform="translate(0,8)">
  <g fill="#FAF6F1">
    <!-- hill the basilica sits on -->
    <path d="M8 82 Q50 70 92 82 L92 88 Q50 78 8 88 Z"/>

    <!-- base facade -->
    <rect x="27" y="66" width="46" height="17" rx="1.5"/>
    <!-- three arched doorways -->
    <g fill="#4A1A20">
      <path d="M33 83 V75 a3.2 3.2 0 0 1 6.4 0 V83 Z"/>
      <path d="M46.8 83 V75 a3.2 3.2 0 0 1 6.4 0 V83 Z"/>
      <path d="M60.6 83 V75 a3.2 3.2 0 0 1 6.4 0 V83 Z"/>
    </g>

    <!-- bell tower (campanile), stage right -->
    <rect x="78" y="40" width="10" height="28"/>
    <path d="M78 42 Q83 30 88 42 Z"/>

    <!-- left small dome -->
    <rect x="24" y="53" width="12" height="14"/>
    <path d="M24 55 Q30 38 36 55 Z"/>

    <!-- right small dome -->
    <rect x="64" y="53" width="12" height="14"/>
    <path d="M64 55 Q70 38 76 55 Z"/>

    <!-- central drum -->
    <rect x="38" y="44" width="24" height="23"/>
    <!-- central great dome -->
    <path d="M38 46 Q40 17 50 15 Q60 17 62 46 Z"/>
    <!-- lantern cupola -->
    <rect x="46.5" y="9" width="7" height="8"/>
    <path d="M46 10 Q50 1 54 10 Z"/>
  </g>
  </g>
</svg>
